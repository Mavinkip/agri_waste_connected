name: agri_waste_connected
description: Agri-Waste Connect - Agricultural Waste Management Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  hydrated_bloc: ^9.1.0

  # Dependency Injection
  get_it: ^7.6.6

  # Networking
  http: ^1.1.0
  connectivity_plus: ^5.0.2

  # JSON
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Location & Media
  geolocator: ^10.1.0
  image_picker: ^1.0.5

  # Utilities
  intl: ^0.18.0

  # Navigation
  go_router: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true